components:
  schemas:
    PaginatedCatalogResponse:
      type: object
      required:
        - page_index
        - page_size
        - total_items
        - total_pages
        - data
      properties:
        page_index:
          type: integer
          minimum: 0
          description: |
            Zero-based current page index.

            **UI Display**: Add 1 for display ("Page 1" for page_index=0)
            **Legacy Source**: `PaginatedItemsViewModel.ActualPage`
            **Runtime Verified**: 0 (first page with all 10 products)
          example: 0

        page_size:
          type: integer
          minimum: 1
          maximum: 100
          description: |
            Number of items per page.

            **Legacy Source**: `PaginatedItemsViewModel.ItemsPerPage`
            **Default**: 10
            **Runtime Verified**: 10
          example: 10

        total_items:
          type: integer
          minimum: 0
          description: |
            Total number of items across all pages.

            **Runtime Verified**: 10 products in live database
            **Legacy Source**: `PaginatedItemsViewModel.TotalItems`
            **SQL**: `SELECT COUNT(*) FROM CatalogItems`
          example: 10

        total_pages:
          type: integer
          minimum: 0
          description: |
            Total number of pages.

            **Calculation**: `ceil(total_items / page_size)`
            **Runtime Verified**: 1 page (10 items ÷ 10 per page)
            **Legacy Source**: `PaginatedItemsViewModel.TotalPages`
          example: 1

        data:
          type: array
          description: |
            Array of catalog items for the current page.

            **Ordering**: Always sorted by `id` ascending (legacy behavior from CatalogService.cs:29)
            **Navigation Properties**: Always includes `catalog_brand` and `catalog_type` (eager-loaded via .Include())
            **Runtime Verified**: 10 items on first page
          items:
            $ref: '#/components/schemas/CatalogItem'
          minItems: 0
          maxItems: 100

    CatalogItem:
      type: object
      description: |
        Catalog item with brand and type information (navigation properties).

        **Source**: CatalogItem (Models/CatalogItem.cs) with .Include(c => c.CatalogBrand).Include(c => c.CatalogType)

        **UI Column Mapping** (runtime-verified from legacy-golden/grid-data.json):
        - Column 1 (empty header): Thumbnail image from `/pics/{picture_file_name}`
        - Column 2 "Name": `name`
        - Column 3 "Description": `description`
        - Column 4 "Brand": `catalog_brand.brand`
        - Column 5 "Type": `catalog_type.type`
        - Column 6 "Price": `price` (formatted: $XX.XX)
        - Column 7 "Picture name": `picture_file_name`
        - Column 8 "Stock": `available_stock`
        - Column 9 "Restock": `restock_threshold`
        - Column 10 "Max stock": `max_stock_threshold`
        - Actions: Edit | Details | Delete (using `id`)

        **CSS Classes** (runtime-verified from legacy-golden/ui-elements.json):
        - Table wrapper: `esh-table`
        - Table header: `esh-table-header`
        - Thumbnail image: `esh-thumbnail`
        - Price display: `esh-price`
        - Action links: `esh-table-link`

      required:
        - id
        - name
        - description
        - price
        - picture_file_name
        - catalog_type_id
        - catalog_brand_id
        - available_stock
        - restock_threshold
        - max_stock_threshold
        - on_reorder
        - catalog_brand
        - catalog_type
      properties:
        id:
          type: integer
          description: |
            Unique product identifier.

            **Legacy Source**: `CatalogItem.Id` (Models/CatalogItem.cs:11)
            **UI Usage**: Used in Edit/Details/Delete navigation links
            **Runtime Range**: 1-10
          example: 1

        name:
          type: string
          maxLength: 255
          description: |
            Product name.

            **Legacy Source**: `CatalogItem.Name` (Models/CatalogItem.cs:12)
            **UI Column**: Column 2 (Name)
            **Runtime Examples**: ".NET Bot Black Hoodie", ".NET Black & White Mug", "Cup<T> White Mug"
          example: ".NET Bot Black Hoodie"

        description:
          type: string
          nullable: true
          maxLength: 1000
          description: |
            Product description.

            **Legacy Source**: `CatalogItem.Description` (Models/CatalogItem.cs:13)
            **UI Column**: Column 3 (Description)
            **Runtime Observation**: Always matches `name` in current dataset
          example: ".NET Bot Black Hoodie"

        price:
          type: number
          format: decimal
          minimum: 0
          multipleOf: 0.01
          description: |
            Product price in USD.

            **Legacy Source**: `CatalogItem.Price` (Models/CatalogItem.cs:14)
            **UI Column**: Column 6 (Price) - formatted as `$XX.XX`
            **UI CSS Class**: `esh-price`
            **Runtime Range**: 8.50 to 19.50
            **Runtime Values**: 19.50, 8.50, 12.00 (3 distinct prices)
          example: 19.50

        picture_file_name:
          type: string
          maxLength: 255
          description: |
            Filename of product image (without path).

            **Legacy Source**: `CatalogItem.PictureFileName` (Models/CatalogItem.cs:15)
            **UI Column**: Column 1 (Thumbnail), Column 7 (Picture name)
            **Image Path**: Served from `/pics/{picture_file_name}`
            **UI CSS Class**: `esh-thumbnail`
            **Default Behavior**: If null, use "dummy.png" (not tested in runtime)
            **Runtime Pattern**: "1.png" through "10.png"
          example: "1.png"

        picture_uri:
          type: string
          format: uri
          nullable: true
          description: |
            Full URI to product image (legacy field, rarely used).

            **Legacy Source**: `CatalogItem.PictureUri` (Models/CatalogItem.cs:16)
            **UI Usage**: Not displayed in table
            **Runtime Observation**: Always null in current dataset
            **Migration Note**: Can be deprecated if not used elsewhere
          example: null

        catalog_type_id:
          type: integer
          description: |
            Foreign key to CatalogType table.

            **Legacy Source**: `CatalogItem.CatalogTypeId` (Models/CatalogItem.cs:17)
            **UI Usage**: Not displayed directly (use `catalog_type.type` instead)
            **Runtime Values**: 1 (Mug), 2 (T-Shirt), 3 (Sheet)
          example: 2

        catalog_brand_id:
          type: integer
          description: |
            Foreign key to CatalogBrand table.

            **Legacy Source**: `CatalogItem.CatalogBrandId` (Models/CatalogItem.cs:18)
            **UI Usage**: Not displayed directly (use `catalog_brand.brand` instead)
            **Runtime Values**: 2 (.NET), 5 (Other)
          example: 2

        available_stock:
          type: integer
          minimum: 0
          description: |
            Current stock quantity.

            **Legacy Source**: `CatalogItem.AvailableStock` (Models/CatalogItem.cs:19)
            **UI Column**: Column 8 (Stock)
            **Runtime Verified**: All products have 100 units
          example: 100

        restock_threshold:
          type: integer
          minimum: 0
          description: |
            Stock level that triggers reorder.

            **Legacy Source**: `CatalogItem.RestockThreshold` (Models/CatalogItem.cs:20)
            **UI Column**: Column 9 (Restock)
            **Runtime Verified**: All products have 0 (no reorder threshold set)
          example: 0

        max_stock_threshold:
          type: integer
          minimum: 0
          description: |
            Maximum stock capacity.

            **Legacy Source**: `CatalogItem.MaxStockThreshold` (Models/CatalogItem.cs:21)
            **UI Column**: Column 10 (Max stock)
            **Runtime Verified**: All products have 0 (no max limit set)
          example: 0

        on_reorder:
          type: boolean
          description: |
            Whether product is currently on reorder.

            **Legacy Source**: `CatalogItem.OnReorder` (Models/CatalogItem.cs:22)
            **UI Usage**: Not displayed in list view
            **Runtime Observation**: Always false
          example: false

        catalog_brand:
          $ref: '#/components/schemas/CatalogBrand'
          description: |
            Navigation property - brand details.

            **Legacy Source**: `CatalogItem.CatalogBrand` (eager-loaded via `.Include(c => c.CatalogBrand)`)
            **UI Column**: Column 4 (Brand) - displays `catalog_brand.brand`
            **SQL**: INNER JOIN with CatalogBrands table (CatalogService.cs:27)

        catalog_type:
          $ref: '#/components/schemas/CatalogType'
          description: |
            Navigation property - product type details.

            **Legacy Source**: `CatalogItem.CatalogType` (eager-loaded via `.Include(c => c.CatalogType)`)
            **UI Column**: Column 5 (Type) - displays `catalog_type.type`
            **SQL**: INNER JOIN with CatalogTypes table (CatalogService.cs:28)

    CatalogBrand:
      type: object
      description: |
        Catalog brand information.

        **Source**: CatalogBrand (Models/CatalogBrand.cs)

        **Runtime Verified Brands** (from legacy-golden/ui-elements.json dropdown options):
        - Azure
        - .NET
        - Visual Studio
        - SQL Server
        - Other

        **Brands Present in Current Dataset**:
        - .NET (id: 2)
        - Other (id: 5)
      required:
        - id
        - brand
      properties:
        id:
          type: integer
          description: |
            Unique brand identifier.

            **Legacy Source**: `CatalogBrand.Id`
            **Runtime Values in Use**: 2 (.NET), 5 (Other)
            **All Available Values**: 1 (Azure), 2 (.NET), 3 (Visual Studio), 4 (SQL Server), 5 (Other)
          example: 2

        brand:
          type: string
          maxLength: 100
          description: |
            Brand name.

            **Legacy Source**: `CatalogBrand.Brand`
            **UI Display**: Column 4 in product table
            **Runtime Values in Use**: ".NET", "Other"
            **All Available Values**: "Azure", ".NET", "Visual Studio", "SQL Server", "Other"
          example: ".NET"

    CatalogType:
      type: object
      description: |
        Catalog type (product category) information.

        **Source**: CatalogType (Models/CatalogType.cs)

        **Runtime Verified Types** (from legacy-golden/ui-elements.json dropdown options):
        - Mug
        - T-Shirt
        - Sheet
        - USB Memory Stick

        **Types Present in Current Dataset**:
        - Mug (id: 1)
        - T-Shirt (id: 2)
        - Sheet (id: 3)
      required:
        - id
        - type
      properties:
        id:
          type: integer
          description: |
            Unique type identifier.

            **Legacy Source**: `CatalogType.Id`
            **Runtime Values in Use**: 1 (Mug), 2 (T-Shirt), 3 (Sheet)
            **All Available Values**: 1 (Mug), 2 (T-Shirt), 3 (Sheet), 4 (USB Memory Stick)
          example: 2

        type:
          type: string
          maxLength: 100
          description: |
            Product type name.

            **Legacy Source**: `CatalogType.Type`
            **UI Display**: Column 5 in product table
            **Runtime Values in Use**: "Mug", "T-Shirt", "Sheet"
            **All Available Values**: "Mug", "T-Shirt", "Sheet", "USB Memory Stick"
          example: "T-Shirt"

    ErrorResponse:
      type: object
      description: |
        Standard error response format.

        **Pattern**: Consistent with FastAPI error handling conventions
        **Logging**: All errors logged with structlog (code, message, detail)
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: |
            Machine-readable error code.

            **Pattern**: UPPER_SNAKE_CASE
            **Examples**: "INVALID_PAGE_SIZE", "DATABASE_ERROR", "NOT_FOUND"
          example: "INVALID_PAGE_SIZE"

        message:
          type: string
          description: |
            Human-readable error message.

            **Audience**: Developers (logged) or end users (displayed)
            **Language**: English
          example: "page_size must be between 1 and 100"

        detail:
          type: object
          nullable: true
          description: |
            Additional error context (optional).

            **Contents**: Field names, invalid values, constraints, validation errors
            **Development Only**: Stack traces should not be included in production
          additionalProperties: true
          example:
            field: "page_size"
            value: 0
            constraint: "minimum: 1"

tags:
  - name: Catalog
    description: |
      Product catalog operations.

      **Seam**: catalog-list
      **Legacy Source**: Default.aspx / CatalogService
      **Operations**: Read-only list with pagination
      **Runtime Status**: ✅ Verified with 10 real products
