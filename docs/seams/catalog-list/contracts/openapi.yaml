openapi: 3.1.0

info:
  title: Catalog List API
  version: v1
  description: |
    Product catalog listing API with pagination support.

    This API provides read-only access to the eShop product catalog,
    matching the legacy WebForms Default.aspx functionality.

    **Runtime Verification Status**: ✅ Verified with 10 real products from live database
    **Seam**: catalog-list
    **Priority**: 1 (High)
    **Status**: Runtime-Verified & Implementation Complete

    **Source**: Migrated from Default.aspx + CatalogService.GetCatalogItemsPaginated()

    **Evidence**:
    - docs/seams/catalog-list/discovery.md (UPDATED with runtime data)
    - docs/seams/catalog-list/ui-behavior.md
    - legacy-golden/grid-data.json (10 real products captured)
    - legacy-golden/ui-elements.json (39 home page elements, 16 create form elements)
    - legacy-golden/screenshots/screen_000_depth0.png (visual baseline)

  contact:
    name: Migration Team

servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: http://localhost:5173/api
    description: Frontend dev proxy

paths:
  /catalog/items:
    get:
      operationId: getCatalogItems
      summary: Get paginated catalog items
      description: |
        Retrieves a paginated list of catalog items with brand and type information.

        **Runtime Evidence**:
        - Total products in database: **10** (runtime-verified, not 12 from seed data)
        - Default page size: 10
        - Total pages with current data: 1
        - All items include eager-loaded navigation properties (CatalogBrand, CatalogType)

        **Legacy Mapping**:
        - Source: `Default.aspx.cs` → `_Default.Page_Load` (line 22)
        - Service: `ICatalogService.GetCatalogItemsPaginated(size, index)` (CatalogService.cs:22)
        - Database: SELECT with 2 INNER JOINs (CatalogBrands, CatalogTypes)
        - Ordering: Always ORDER BY Id ASC (CatalogService.cs:29)

        **Business Rules**:
        - Default page size: 10 items (DefaultPageSize constant)
        - Default page index: 0 (first page, DefaultPageIndex constant)
        - Items ordered by ID ascending
        - Navigation properties (CatalogBrand, CatalogType) eagerly loaded via .Include()

        **UI Display**:
        - Table with 10 columns + Actions column
        - Pagination controls (Previous/Next)
        - "Showing X of Y products - Page N - M"

      tags:
        - Catalog

      parameters:
        - name: page_size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: |
            Number of items to return per page.

            **Default**: 10 (legacy hardcoded value)
            **Validation**: Must be between 1 and 100
            **Evidence**: Default.aspx.cs:15 (DefaultPageSize constant)

        - name: page_index
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: |
            Zero-based page index.

            **Default**: 0 (first page)
            **Legacy Behavior**: Page numbering starts at 0, but UI displays as "Page 1"
            **Evidence**: Default.aspx.cs:16 (DefaultPageIndex constant)

