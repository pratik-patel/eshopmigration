openapi: 3.1.0
info:
  title: Catalog CRUD API
  description: |
    Complete CRUD operations (Create, Read, Update, Delete) for catalog items.

    **Seam**: catalog-crud
    **Priority**: 2 (High)
    **Status**: Implementation Complete

    **Source**: Migrated from Catalog/Create.aspx, Catalog/Edit.aspx, Catalog/Details.aspx, Catalog/Delete.aspx + CatalogService

    **Evidence**:
    - docs/seams/catalog-crud/discovery.md
    - docs/seams/catalog-crud/ui-behavior.md
    - docs/seams/catalog-crud/contracts/required-fields.json

    **Business Rules**: All 28 business rules from docs/context-fabric/business-rules.json apply
  version: 1.0.0
  contact:
    name: Migration Team

servers:
  - url: http://localhost:8000/api
    description: Local development server
  - url: http://localhost:5173/api
    description: Frontend dev proxy

paths:
  /catalog/items:
    post:
      operationId: createCatalogItem
      summary: Create new catalog item
      description: |
        Creates a new catalog item with validation.

        **Legacy Endpoint**: POST to /Catalog/Create.aspx
        **Legacy Method**: CatalogService.CreateCatalogItem(catalogItem)

        **Business Rules**:
        - Name required (BR-005)
        - Price: 0-1000000, max 2 decimals (BR-001)
        - Stock fields: 0-10000000 (BR-002, BR-003, BR-004)
        - Brand and Type must exist in database
        - Picture filename defaults to "dummy.png" (BR-006)
        - ID generated via HiLo pattern

        **Side Effects**:
        - INSERT INTO CatalogItems
        - Redirect to catalog list (/)

        **Evidence**: Catalog/Create.aspx.cs:30-50
      tags:
        - Catalog
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCatalogItemRequest'
            examples:
              minimal:
                summary: Minimal valid request
                value:
                  name: "Test Product"
                  price: 19.99
                  catalog_brand_id: 1
                  catalog_type_id: 2
              complete:
                summary: Complete request with all fields
                value:
                  name: ".NET Bot Black Hoodie"
                  description: ".NET Bot Black Hoodie, and more"
                  price: 19.50
                  catalog_brand_id: 1
                  catalog_type_id: 2
                  available_stock: 100
                  restock_threshold: 10
                  max_stock_threshold: 200
                  picture_file_name: "1.png"

      responses:
        '201':
          description: |
            Catalog item created successfully.

            Returns the created item with ID assigned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemDto'
              example:
                id: 13
                name: "Test Product"
                description: null
                price: 19.99
                picture_file_name: "dummy.png"
                picture_uri: null
                catalog_type_id: 2
                catalog_brand_id: 1
                available_stock: 0
                restock_threshold: 0
                max_stock_threshold: 0
                on_reorder: false
                catalog_type:
                  id: 2
                  type: "T-Shirt"
                catalog_brand:
                  id: 1
                  brand: ".NET"

        '400':
          description: |
            Bad request - validation errors.

            **Validation Errors**:
            - Name required (BR-005): "The Name field is required."
            - Price range (BR-001): "The Price must be a positive number with maximum two decimals between 0 and 1 million."
            - Stock range (BR-002): "The field Stock must be between 0 and 10 million."
            - Restock range (BR-003): "The field Restock must be between 0 and 10 million."
            - Max stock range (BR-004): "The field Max stock must be between 0 and 10 million."

            **Evidence**: legacy-golden/catalog-crud/exports/synthetic_validation_errors.json
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              examples:
                empty_name:
                  summary: Name required
                  value:
                    code: "validation_error"
                    message: "Validation failed"
                    detail:
                      name: "The Name field is required."
                invalid_price_negative:
                  summary: Negative price
                  value:
                    code: "validation_error"
                    message: "Validation failed"
                    detail:
                      price: "The Price must be a positive number with maximum two decimals between 0 and 1 million."
                invalid_price_decimals:
                  summary: Too many decimal places
                  value:
                    code: "validation_error"
                    message: "Validation failed"
                    detail:
                      price: "The Price must be a positive number with maximum two decimals between 0 and 1 million."
                invalid_stock:
                  summary: Stock out of range
                  value:
                    code: "validation_error"
                    message: "Validation failed"
                    detail:
                      available_stock: "The field Stock must be between 0 and 10 million."

        '404':
          description: |
            Brand or Type not found.

            **Scenario**: catalog_brand_id or catalog_type_id references non-existent entity.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Brand with id '99' not found"
                detail: null

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /catalog/items/{id}:
    get:
      operationId: getCatalogItem
      summary: Get single catalog item by ID
      description: |
        Returns a single catalog item with brand and type information.

        **Legacy Endpoint**: GET /Catalog/Details/{id} or GET /Catalog/Edit/{id} or GET /Catalog/Delete/{id}
        **Legacy Method**: CatalogService.FindCatalogItem(id)

        **UI Pages**:
        - Details.aspx: Read-only display with Edit button
        - Edit.aspx: Form pre-population
        - Delete.aspx: Confirmation display

        **Evidence**:
        - Catalog/Details.aspx.cs:16-23
        - Catalog/Edit.aspx.cs:18-35
        - Catalog/Delete.aspx.cs:16-24
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          description: Catalog item ID
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1

      responses:
        '200':
          description: Successfully retrieved catalog item
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemDto'
              example:
                id: 1
                name: ".NET Bot Black Hoodie"
                description: ".NET Bot Black Hoodie, and more"
                price: 19.50
                picture_file_name: "1.png"
                picture_uri: null
                catalog_type_id: 2
                catalog_brand_id: 1
                available_stock: 100
                restock_threshold: 0
                max_stock_threshold: 0
                on_reorder: false
                catalog_type:
                  id: 2
                  type: "T-Shirt"
                catalog_brand:
                  id: 1
                  brand: ".NET"

        '404':
          description: |
            Catalog item not found.

            **Scenario**: User navigates to /Catalog/Edit/99999
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Catalog item with id '99999' not found"
                detail: null

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      operationId: updateCatalogItem
      summary: Update existing catalog item
      description: |
        Updates an existing catalog item with validation.

        **Legacy Endpoint**: POST to /Catalog/Edit.aspx?id={id}
        **Legacy Method**: CatalogService.UpdateCatalogItem(catalogItem)

        **Business Rules**: Same as Create (BR-001 to BR-006)

        **UI Behavior**:
        - Picture filename is READ-ONLY (displayed but not editable)
        - All other fields editable

        **Side Effects**:
        - UPDATE CatalogItems SET ... WHERE Id = {id}
        - Redirect to catalog list (/)

        **Evidence**: Catalog/Edit.aspx.cs:47-68
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          description: Catalog item ID to update
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCatalogItemRequest'
            example:
              name: ".NET Bot Black Hoodie (Updated)"
              description: "Updated description"
              price: 22.50
              catalog_brand_id: 1
              catalog_type_id: 2
              available_stock: 150
              restock_threshold: 20
              max_stock_threshold: 300
              picture_file_name: "1.png"

      responses:
        '200':
          description: |
            Catalog item updated successfully.

            Returns the updated item.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogItemDto'
              example:
                id: 1
                name: ".NET Bot Black Hoodie (Updated)"
                description: "Updated description"
                price: 22.50
                picture_file_name: "1.png"
                picture_uri: null
                catalog_type_id: 2
                catalog_brand_id: 1
                available_stock: 150
                restock_threshold: 20
                max_stock_threshold: 300
                on_reorder: false
                catalog_type:
                  id: 2
                  type: "T-Shirt"
                catalog_brand:
                  id: 1
                  brand: ".NET"

        '400':
          description: |
            Bad request - validation errors (same as Create).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'

        '404':
          description: |
            Catalog item, brand, or type not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Catalog item with id '99999' not found"
                detail: null

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      operationId: deleteCatalogItem
      summary: Delete catalog item
      description: |
        Deletes a catalog item permanently.

        **Legacy Endpoint**: POST to /Catalog/Delete.aspx?id={id}
        **Legacy Method**: CatalogService.RemoveCatalogItem(catalogItem)

        **UI Workflow**:
        1. User navigates to /Catalog/Delete/{id}
        2. Confirmation page displays product details
        3. User clicks "Delete" button
        4. Item deleted, redirect to catalog list

        **Side Effects**:
        - DELETE FROM CatalogItems WHERE Id = {id}
        - Redirect to catalog list (/)

        **Evidence**: Catalog/Delete.aspx.cs:26-30
      tags:
        - Catalog
      parameters:
        - name: id
          in: path
          description: Catalog item ID to delete
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1

      responses:
        '204':
          description: |
            Catalog item deleted successfully.

            No content returned.

        '404':
          description: |
            Catalog item not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                code: "not_found"
                message: "Catalog item with id '99999' not found"
                detail: null

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /catalog/brands:
    get:
      operationId: getCatalogBrands
      summary: Get all catalog brands
      description: |
        Returns all catalog brands for dropdown population.

        **Legacy Endpoint**: GetBrands() method in Create.aspx.cs and Edit.aspx.cs
        **Legacy Method**: CatalogService.GetCatalogBrands()

        **Usage**:
        - Populate Brand dropdown on Create page
        - Populate Brand dropdown on Edit page

        **Ordering**: By ID ascending

        **Evidence**:
        - Catalog/Create.aspx.cs:20-23
        - Catalog/Edit.aspx.cs:109
        - CatalogService.cs:47
      tags:
        - Catalog
      responses:
        '200':
          description: Successfully retrieved all brands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogBrandDto'
              example:
                - id: 1
                  brand: ".NET"
                - id: 2
                  brand: "Other"
                - id: 3
                  brand: "Azure"
                - id: 4
                  brand: "Visual Studio"
                - id: 5
                  brand: "SQL Server"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /catalog/types:
    get:
      operationId: getCatalogTypes
      summary: Get all catalog types
      description: |
        Returns all catalog types for dropdown population.

        **Legacy Endpoint**: GetTypes() method in Create.aspx.cs and Edit.aspx.cs
        **Legacy Method**: CatalogService.GetCatalogTypes()

        **Usage**:
        - Populate Type dropdown on Create page
        - Populate Type dropdown on Edit page

        **Ordering**: By ID ascending

        **Evidence**:
        - Catalog/Create.aspx.cs:25-28
        - Catalog/Edit.aspx.cs:112
        - CatalogService.cs:42
      tags:
        - Catalog
      responses:
        '200':
          description: Successfully retrieved all types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CatalogTypeDto'
              example:
                - id: 1
                  type: "Mug"
                - id: 2
                  type: "T-Shirt"
                - id: 3
                  type: "Sheet"
                - id: 4
                  type: "USB Memory Stick"

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CreateCatalogItemRequest:
      type: object
      description: |
        Request body for creating a new catalog item.

        **Source**: Form fields from Catalog/Create.aspx
        **Evidence**: Catalog/Create.aspx.cs:36-43

        **Validation**:
        - Name: Required, min 1 char (BR-005)
        - Price: Required, 0-1000000, max 2 decimals (BR-001)
        - Brand/Type: Required, must exist (implicit)
        - Stock fields: 0-10000000 (BR-002, BR-003, BR-004)
      required:
        - name
        - price
        - catalog_brand_id
        - catalog_type_id
      properties:
        name:
          type: string
          description: Product name (required)
          minLength: 1
          example: ".NET Bot Black Hoodie"
        description:
          type: string
          nullable: true
          description: Product description (optional)
          example: ".NET Bot Black Hoodie, and more"
        price:
          type: number
          format: decimal
          description: Product price (required, 2 decimal places max)
          minimum: 0
          maximum: 1000000
          example: 19.50
        catalog_brand_id:
          type: integer
          description: Brand ID (required, must exist in CatalogBrands)
          minimum: 1
          example: 1
        catalog_type_id:
          type: integer
          description: Type ID (required, must exist in CatalogTypes)
          minimum: 1
          example: 2
        available_stock:
          type: integer
          description: Current stock level (optional, default 0)
          minimum: 0
          maximum: 10000000
          default: 0
          example: 100
        restock_threshold:
          type: integer
          description: Minimum stock level before reorder (optional, default 0)
          minimum: 0
          maximum: 10000000
          default: 0
          example: 0
        max_stock_threshold:
          type: integer
          description: Maximum stock level (optional, default 0)
          minimum: 0
          maximum: 10000000
          default: 0
          example: 0
        picture_file_name:
          type: string
          description: Image filename (optional, default "dummy.png")
          default: "dummy.png"
          example: "1.png"

    UpdateCatalogItemRequest:
      type: object
      description: |
        Request body for updating an existing catalog item.

        **Source**: Form fields from Catalog/Edit.aspx
        **Evidence**: Catalog/Edit.aspx.cs:50-60

        **Differences from Create**:
        - Picture filename is READ-ONLY in UI but still present in request
        - All validation rules same as Create
      required:
        - name
        - price
        - catalog_brand_id
        - catalog_type_id
        - picture_file_name
      properties:
        name:
          type: string
          description: Product name (required)
          minLength: 1
          example: ".NET Bot Black Hoodie"
        description:
          type: string
          nullable: true
          description: Product description (optional)
          example: ".NET Bot Black Hoodie, and more"
        price:
          type: number
          format: decimal
          description: Product price (required, 2 decimal places max)
          minimum: 0
          maximum: 1000000
          example: 19.50
        catalog_brand_id:
          type: integer
          description: Brand ID (required, must exist in CatalogBrands)
          minimum: 1
          example: 1
        catalog_type_id:
          type: integer
          description: Type ID (required, must exist in CatalogTypes)
          minimum: 1
          example: 2
        available_stock:
          type: integer
          description: Current stock level
          minimum: 0
          maximum: 10000000
          example: 100
        restock_threshold:
          type: integer
          description: Minimum stock level before reorder
          minimum: 0
          maximum: 10000000
          example: 0
        max_stock_threshold:
          type: integer
          description: Maximum stock level
          minimum: 0
          maximum: 10000000
          example: 0
        picture_file_name:
          type: string
          description: Image filename (required, read-only in UI)
          example: "1.png"

    CatalogItemDto:
      type: object
      description: |
        Catalog item with brand and type information (navigation properties).

        **Source**: CatalogItem (Models/CatalogItem.cs) with .Include(c => c.CatalogBrand).Include(c => c.CatalogType)

        **Used by**:
        - GET /catalog/items/{id}
        - POST /catalog/items (response)
        - PUT /catalog/items/{id} (response)
      required:
        - id
        - name
        - price
        - picture_file_name
        - catalog_type_id
        - catalog_brand_id
        - available_stock
        - restock_threshold
        - max_stock_threshold
        - on_reorder
        - catalog_type
        - catalog_brand
      properties:
        id:
          type: integer
          description: Unique product identifier
          example: 1
        name:
          type: string
          description: Product name
          minLength: 1
          example: ".NET Bot Black Hoodie"
        description:
          type: string
          nullable: true
          description: Product description (optional)
          example: ".NET Bot Black Hoodie, and more"
        price:
          type: number
          format: decimal
          description: Product price (2 decimal places)
          minimum: 0
          maximum: 1000000
          example: 19.50
        picture_file_name:
          type: string
          description: Image filename (stored in /pics/ folder)
          example: "1.png"
        picture_uri:
          type: string
          nullable: true
          description: Legacy field for image URI (not used)
          example: null
        catalog_type_id:
          type: integer
          description: Foreign key to CatalogTypes table
          example: 2
        catalog_brand_id:
          type: integer
          description: Foreign key to CatalogBrands table
          example: 1
        available_stock:
          type: integer
          description: Current stock level
          minimum: 0
          maximum: 10000000
          example: 100
        restock_threshold:
          type: integer
          description: Minimum stock level before reorder
          minimum: 0
          maximum: 10000000
          example: 0
        max_stock_threshold:
          type: integer
          description: Maximum stock level
          minimum: 0
          maximum: 10000000
          example: 0
        on_reorder:
          type: boolean
          description: Whether product is currently on reorder
          example: false
        catalog_type:
          $ref: '#/components/schemas/CatalogTypeDto'
        catalog_brand:
          $ref: '#/components/schemas/CatalogBrandDto'

    CatalogBrandDto:
      type: object
      description: |
        Catalog brand information.

        **Source**: CatalogBrand (Models/CatalogBrand.cs)
      required:
        - id
        - brand
      properties:
        id:
          type: integer
          description: Unique brand identifier
          example: 1
        brand:
          type: string
          description: Brand name
          example: ".NET"

    CatalogTypeDto:
      type: object
      description: |
        Catalog type information.

        **Source**: CatalogType (Models/CatalogType.cs)
      required:
        - id
        - type
      properties:
        id:
          type: integer
          description: Unique type identifier
          example: 2
        type:
          type: string
          description: Type name
          example: "T-Shirt"

    ValidationErrorResponse:
      type: object
      description: |
        Validation error response with field-specific messages.

        **Source**: ModelState validation errors from WebForms
        **Evidence**: legacy-golden/catalog-crud/exports/synthetic_validation_errors.json
      required:
        - code
        - message
        - detail
      properties:
        code:
          type: string
          description: Error code (always "validation_error")
          enum:
            - validation_error
          example: "validation_error"
        message:
          type: string
          description: Human-readable error message
          example: "Validation failed"
        detail:
          type: object
          description: Field-specific error messages
          additionalProperties:
            type: string
          example:
            name: "The Name field is required."
            price: "The Price must be a positive number with maximum two decimals between 0 and 1 million."

    ErrorResponse:
      type: object
      description: Standard error response format
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Error code identifier
          example: "not_found"
        message:
          type: string
          description: Human-readable error message
          example: "Catalog item with id '99999' not found"
        detail:
          type: object
          nullable: true
          description: Additional error details
          additionalProperties: true
          example: null

tags:
  - name: Catalog
    description: Catalog item CRUD operations
